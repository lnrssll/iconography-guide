# /etc/nginx/sites-available/iconography-guide
# Symlink to sites-enabled, then run: certbot --nginx -d icons.lnrssll.com

server {
    listen 80;
    server_name icons.lnrssll.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name icons.lnrssll.com;

    # SSL — certbot will fill these in, or set them manually
    ssl_certificate     /etc/letsencrypt/live/icons.lnrssll.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icons.lnrssll.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Serve static assets directly from disk — avoids hitting Node for every request
    root /opt/iconography-guide/public;
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        try_files $uri @node;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else proxies to the Node app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location @node {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
